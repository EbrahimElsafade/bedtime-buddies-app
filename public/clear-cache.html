<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Dolphoon Cache Recovery</title>
    <style>
      body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f8fbff;color:#111b3a;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif}main{width:min(560px,calc(100% - 32px));text-align:center}button,a{display:inline-flex;align-items:center;justify-content:center;margin:8px;padding:12px 18px;border-radius:10px;border:0;background:#ff7417;color:white;text-decoration:none;font-weight:700;cursor:pointer}.muted{color:#536179;line-height:1.8}pre{white-space:pre-wrap;text-align:left;direction:ltr;background:#eef3fb;padding:12px;border-radius:8px;min-height:44px}</style>
  </head>
  <body>
    <main>
      <h1>إصلاح تحميل Dolphoon</h1>
      <p class="muted">هذه الصفحة تنظف نسخة المتصفح القديمة ثم تعيد فتح الموقع.</p>
      <button id="clear">تنظيف وفتح الموقع</button>
      <a href="/">فتح الموقع</a>
      <pre id="status">جاهز</pre>
    </main>
    <script>
      async function clearDolphoonCache(){
        const log=[];
        try{
          if('serviceWorker' in navigator){
            const registrations=await navigator.serviceWorker.getRegistrations();
            await Promise.allSettled(registrations.map(r=>r.unregister()));
            log.push('Unregistered service workers: '+registrations.length);
          }
          if('caches' in window){
            const names=await caches.keys();
            await Promise.allSettled(names.map(name=>caches.delete(name)));
            log.push('Deleted caches: '+names.length);
          }
          try{localStorage.removeItem('i18nextLng')}catch(e){}
          sessionStorage.clear();
          document.getElementById('status').textContent=log.join('\n')||'Cleaned';
          setTimeout(()=>location.replace('/?cache-reset='+Date.now()),700);
        }catch(error){
          document.getElementById('status').textContent='Error: '+(error&&error.message?error.message:error);
        }
      }
      document.getElementById('clear').addEventListener('click',clearDolphoonCache);
      clearDolphoonCache();
    </script>
  </body>
</html>
