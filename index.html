  <!-- One-time cache/SW kill switch for returning devices stuck on old bundles.
       Bump KILL_VERSION any time you need to force ALL existing devices to wipe caches. -->
  <script>
    (function () {
      try {
        var KILL_VERSION = '2026-06-04-2';
        var KEY = '__dolphoon_sw_kill';
        if (localStorage.getItem(KEY) === KILL_VERSION) return;

        var didWork = false;

        var cleanupTasks = [];

        if ('serviceWorker' in navigator) {
          cleanupTasks.push(
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              return Promise.all(regs.map(function (r) { didWork = true; return r.unregister(); }));
            }).catch(function () {})
          );
        }

        if (typeof caches !== 'undefined' && caches.keys) {
          cleanupTasks.push(caches.keys().then(function (keys) {
            return Promise.all(keys.map(function (k) { didWork = true; return caches.delete(k); }));
          }).catch(function () {}));
        }

        if (cleanupTasks.length) {
          Promise.all(cleanupTasks).then(function () {
            localStorage.setItem(KEY, KILL_VERSION);
          }).catch(function () { localStorage.setItem(KEY, KILL_VERSION); });
        } else {
          localStorage.setItem(KEY, KILL_VERSION);
        }
      } catch (e) { /* ignore */ }
    })();
  </script>
